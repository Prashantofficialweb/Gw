<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gw Ztreaming // Light Green</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>

<style>
    :root {
        --gw-green: #90EE90; /* Light Green */
        --gw-dark: #1b1b1b;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body { background: #000; font-family: sans-serif; height: 100vh; overflow: hidden; }

    #player-container {
        width: 100%;
        height: 100%;
        background: #000;
    }

    video { width: 100%; height: 100%; }

    /* Light Green Branding */
    .brand-overlay {
        position: absolute;
        top: 15px;
        left: 15px;
        z-index: 10;
        color: var(--gw-green);
        font-weight: bold;
        font-size: 18px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        pointer-events: none;
    }

    .live-tag {
        position: absolute;
        top: 15px;
        right: 15px;
        background: var(--gw-green);
        color: #000;
        padding: 3px 10px;
        border-radius: 5px;
        font-weight: bold;
        font-size: 12px;
        z-index: 10;
    }

    /* Custom Green Seekbar */
    .shaka-range-element { color: var(--gw-green) !important; }
    .shaka-play-button { color: var(--gw-green) !important; }
    .shaka-current-time { color: #fff !important; }

    /* Error Message Style */
    #status-msg {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--gw-green);
        text-align: center;
        display: none;
        z-index: 100;
        background: rgba(0,0,0,0.8);
        padding: 20px;
        border: 1px solid var(--gw-green);
    }
</style>
</head>
<body>

<div class="brand-overlay">GW ZTREAMING</div>
<div class="live-tag">LIVE</div>
<div id="status-msg">Connecting to Ztreaming...</div>

<div id="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const CONFIG = {
    url: "https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
    keyId: "400131994b445d8c8817202248760fda",
    key: "2d56cb6f07a75b9aff165d534ae2bfc4",
    cookieUrl: "https://allrounder-live.pages.dev/api/cookie.json"
};

async function initGwPlayer() {
    const video = document.getElementById('video');
    const container = document.getElementById('player-container');
    const status = document.getElementById('status-msg');

    // Initialize Shaka
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
        status.innerText = "Browser Not Supported";
        status.style.display = "block";
        return;
    }

    const player = new shaka.Player(video);
    const ui = new shaka.ui.Overlay(player, container, video);

    // Green Theme UI
    ui.configure({
        'controlPanelElements': ["play_pause", "mute", "volume", "spacer", "quality", "fullscreen"],
        'seekBarColors': {
            base: 'rgba(255,255,255,0.2)',
            buffered: 'rgba(144, 238, 144, 0.4)',
            played: '#90EE90' 
        }
    });

    player.configure({
        drm: {
            clearKeys: { [CONFIG.keyId]: CONFIG.key }
        },
        streaming: {
            rebufferingGoal: 2,
            bufferingGoal: 10,
        }
    });

    try {
        // Fetch Token
        const cookieRes = await fetch(CONFIG.cookieUrl);
        const cookieData = await cookieRes.json();
        let fullCookie = cookieData.cookie || "";
        
        // Clean Token (Removes __hdnea__= prefix and any extra spaces)
        let token = fullCookie.replace("__hdnea__=", "").split(';')[0].trim();

        if(!token) {
            status.innerText = "Error: Invalid Authentication Token";
            status.style.display = "block";
        }

        // Apply Token to Network Requests
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            // Note: Referer and User-Agent are often blocked by browsers.
            // We focus on adding the token to the URL which is more reliable.
            if (token) {
                const separator = request.uris[0].includes('?') ? '&' : '?';
                request.uris[0] += separator + "__hdnea__=" + token;
            }
        });

        // Load Stream
        await player.load(CONFIG.url);
        status.style.display = "none"; // Hide loading message
        console.log("Gw Ztreaming Started!");

    } catch (error) {
        console.error("Load Error", error);
        status.innerText = "Stream Offline or Keys Expired";
        status.style.display = "block";
    }
}

// Start player
document.addEventListener('shaka-ui-loaded', initGwPlayer);
document.addEventListener('DOMContentLoaded', () => {
    if (!window['shaka']) {
        // Fallback if UI load event missed
        setTimeout(initGwPlayer, 1000);
    }
});
</script>

</body>
</html>
